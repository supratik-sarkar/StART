name: ci

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Type check (mypy)
        run: mypy || true   # advisory in v0.1; gate once annotations stabilize
      - name: Tests (pytest + hypothesis, local providers only)
        run: pytest
      - name: CLI smoke test
        run: |
          start doctor
          start list-tests
